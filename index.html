<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market Intelligence — OrcaHS9</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Syne:wght@400;500;600;700&family=Syne+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:       #06060f;
            --surface:  #0d0d18;
            --surface2: #12121e;
            --border:   #1a1a2c;
            --border-lt:#222235;
            --gold:     #c9a55a;
            --gold-lt:  #e2c07e;
            --gold-dim: rgba(201,165,90,0.1);
            --text:     #ede8e0;
            --text-2:   #7a7a90;
            --text-3:   #333348;
            --green:    #5cba8a;
            --red:      #d96060;
            --blue:     #5588cc;
            --purple:   #8866cc;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        html { font-size:15px; }
        body { background:var(--bg); color:var(--text); font-family:'Syne',sans-serif; min-height:100vh; overflow-x:hidden; }
        body::before {
            content:''; position:fixed; inset:0; pointer-events:none; z-index:9999; opacity:.4;
            background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
        }

        /* ── TICKER BAR ── */
        .ticker-bar {
            background:var(--surface);
            border-bottom:1px solid var(--border);
            padding:.55rem 0;
            overflow:hidden;
            position:relative;
        }
        .ticker-bar::before, .ticker-bar::after {
            content:''; position:absolute; top:0; bottom:0; width:60px; z-index:2; pointer-events:none;
        }
        .ticker-bar::before { left:0;  background:linear-gradient(to right, var(--surface), transparent); }
        .ticker-bar::after  { right:0; background:linear-gradient(to left,  var(--surface), transparent); }
        .ticker-track {
            display:flex; gap:2.5rem;
            animation:ticker 40s linear infinite;
            width:max-content;
        }
        .ticker-track:hover { animation-play-state:paused; }
        @keyframes ticker { from{transform:translateX(0)} to{transform:translateX(-50%)} }
        .ticker-item {
            display:flex; align-items:center; gap:.5rem; white-space:nowrap;
            font-family:'Syne Mono',monospace; font-size:.68rem; letter-spacing:.05em;
        }
        .ticker-symbol { color:var(--text-2); }
        .ticker-price  { color:var(--text); }
        .ticker-change.up   { color:var(--green); }
        .ticker-change.down { color:var(--red); }
        .ticker-change.flat { color:var(--text-2); }

        /* ── HEADER ── */
        header {
            padding:1.8rem 3rem 1.5rem;
            border-bottom:1px solid var(--border);
            display:flex; justify-content:space-between; align-items:flex-end;
            position:relative;
        }
        header::after { content:''; position:absolute; bottom:-1px; left:3rem; width:80px; height:1px; background:var(--gold); }
        .eyebrow { font-family:'Syne Mono',monospace; font-size:.6rem; letter-spacing:.28em; color:var(--gold); text-transform:uppercase; margin-bottom:.35rem; }
        h1 { font-family:'Cormorant Garamond',serif; font-size:2rem; font-weight:300; line-height:1; }
        h1 em { color:var(--gold); font-style:italic; }
        .hdr-right { text-align:right; display:flex; flex-direction:column; gap:.3rem; align-items:flex-end; }
        .live-dot {
            display:flex; align-items:center; gap:.4rem;
            font-family:'Syne Mono',monospace; font-size:.6rem; letter-spacing:.15em; color:var(--green);
        }
        .live-dot::before { content:''; width:6px; height:6px; border-radius:50%; background:var(--green); animation:blink 1.5s ease infinite; }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
        .last-update { font-family:'Syne Mono',monospace; font-size:.58rem; color:var(--text-3); letter-spacing:.1em; }

        /* ── INDICES ROW ── */
        .indices-row {
            display:grid; grid-template-columns:repeat(3,1fr);
            border-bottom:1px solid var(--border);
            background:var(--surface);
        }
        .index-card {
            padding:1.2rem 2rem; border-right:1px solid var(--border);
            display:flex; justify-content:space-between; align-items:center;
            cursor:pointer; transition:background .12s;
        }
        .index-card:hover { background:var(--surface2); }
        .index-card:last-child { border-right:none; }
        .index-name { font-family:'Syne Mono',monospace; font-size:.62rem; letter-spacing:.15em; color:var(--text-2); text-transform:uppercase; margin-bottom:.3rem; }
        .index-price { font-family:'Cormorant Garamond',serif; font-size:1.6rem; font-weight:400; }
        .index-change { font-family:'Syne Mono',monospace; font-size:.72rem; letter-spacing:.05em; margin-top:.15rem; }
        .index-change.up   { color:var(--green); }
        .index-change.down { color:var(--red); }
        .index-change.flat { color:var(--text-2); }
        .index-bar { width:80px; height:36px; }

        /* ── SECTOR HEATMAP ── */
        .sector-row {
            background:var(--bg);
            border-bottom:1px solid var(--border);
            padding:1rem 2rem;
        }
        .sector-row-label {
            font-family:'Syne Mono',monospace; font-size:.58rem; letter-spacing:.22em; color:var(--text-3);
            text-transform:uppercase; margin-bottom:.7rem;
        }
        .sector-grid {
            display:grid; grid-template-columns:repeat(8,1fr); gap:.4rem;
        }
        .sector-cell {
            padding:.6rem .4rem; border-radius:2px; text-align:center;
            cursor:pointer; transition:filter .12s, transform .1s;
            position:relative; overflow:hidden;
        }
        .sector-cell:hover { filter:brightness(1.2); transform:translateY(-1px); }
        .sector-name { font-family:'Syne Mono',monospace; font-size:.55rem; letter-spacing:.06em; color:#fff; opacity:.75; line-height:1.3; }
        .sector-pct  { font-family:'Syne Mono',monospace; font-size:.72rem; font-weight:600; color:#fff; margin-top:.2rem; }

        /* ── MAIN LAYOUT ── */
        .layout { display:grid; grid-template-columns:1fr 320px; gap:0; min-height:calc(100vh - 280px); }

        /* ── NEWS FEED ── */
        .news-panel { border-right:1px solid var(--border); }
        .panel-head {
            padding:1rem 2rem; border-bottom:1px solid var(--border);
            background:var(--surface2);
            display:flex; justify-content:space-between; align-items:center;
        }
        .panel-title { font-family:'Cormorant Garamond',serif; font-size:1.1rem; font-weight:400; letter-spacing:.03em; display:flex; align-items:center; gap:.6rem; }
        .panel-title .icon { font-size:.9rem; opacity:.5; }
        .filter-bar { display:flex; gap:.5rem; }
        .filter-btn {
            background:transparent; border:1px solid var(--border-lt); color:var(--text-2);
            padding:.28rem .7rem; font-family:'Syne Mono',monospace; font-size:.58rem; letter-spacing:.1em;
            text-transform:uppercase; cursor:pointer; transition:all .15s; border-radius:1px;
        }
        .filter-btn.active { border-color:var(--gold); color:var(--gold); background:var(--gold-dim); }
        .filter-btn:hover  { border-color:var(--text-2); color:var(--text); }

        .news-list { padding:0; }
        .news-item {
            padding:1.2rem 2rem; border-bottom:1px solid var(--border);
            cursor:pointer; transition:background .12s; text-decoration:none; display:block; color:inherit;
        }
        .news-item:hover { background:var(--surface2); }
        .news-meta { display:flex; align-items:center; gap:.6rem; margin-bottom:.5rem; flex-wrap:wrap; }
        .news-source { font-family:'Syne Mono',monospace; font-size:.58rem; letter-spacing:.15em; color:var(--text-3); text-transform:uppercase; }
        .news-time   { font-family:'Syne Mono',monospace; font-size:.58rem; color:var(--text-3); }
        .sentiment-badge {
            display:inline-flex; align-items:center; gap:.3rem;
            padding:.15rem .5rem; border-radius:1px; font-family:'Syne Mono',monospace;
            font-size:.55rem; letter-spacing:.12em; text-transform:uppercase;
        }
        .sentiment-badge::before { content:''; width:5px; height:5px; border-radius:50%; }
        .sentiment-badge.bullish { background:rgba(92,186,138,.1); color:var(--green); border:1px solid rgba(92,186,138,.25); }
        .sentiment-badge.bullish::before { background:var(--green); }
        .sentiment-badge.bearish { background:rgba(217,96,96,.1); color:var(--red); border:1px solid rgba(217,96,96,.25); }
        .sentiment-badge.bearish::before { background:var(--red); }
        .sentiment-badge.neutral { background:rgba(170,170,170,.08); color:var(--text-2); border:1px solid rgba(170,170,170,.15); }
        .sentiment-badge.neutral::before { background:var(--text-2); }

        .news-title { font-size:.92rem; line-height:1.45; margin-bottom:.6rem; font-weight:500; }
        .news-summary { font-size:.78rem; color:var(--text-2); line-height:1.5; margin-bottom:.7rem; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
        .impact-tags { display:flex; gap:.4rem; flex-wrap:wrap; }
        .impact-tag {
            display:inline-block; padding:.15rem .5rem; border-radius:1px;
            font-family:'Syne Mono',monospace; font-size:.55rem; letter-spacing:.1em; text-transform:uppercase;
            border:1px solid; opacity:.85;
        }

        /* ── SIDEBAR ── */
        .sidebar { background:var(--surface); }
        .watchlist { }
        .watchlist-head {
            padding:1rem 1.5rem; border-bottom:1px solid var(--border); background:var(--surface2);
            display:flex; justify-content:space-between; align-items:center;
        }
        .watchlist-title { font-family:'Cormorant Garamond',serif; font-size:1.1rem; font-weight:400; }
        .watchlist-hint { font-family:'Syne Mono',monospace; font-size:.55rem; color:var(--text-3); letter-spacing:.08em; }
        .watchlist-item {
            padding:.85rem 1.5rem; border-bottom:1px solid var(--border);
            display:grid; grid-template-columns:1fr auto; align-items:center; gap:.5rem;
            transition:background .12s; cursor:pointer;
        }
        .watchlist-item:hover { background:var(--surface2); }
        .w-left .w-symbol { font-family:'Syne Mono',monospace; font-size:.78rem; letter-spacing:.08em; color:var(--gold); }
        .w-left .w-name   { font-size:.68rem; color:var(--text-2); margin-top:.1rem; }
        .w-right { text-align:right; }
        .w-price  { font-family:'Syne Mono',monospace; font-size:.8rem; }
        .w-change { font-family:'Syne Mono',monospace; font-size:.68rem; margin-top:.1rem; }
        .w-change.up   { color:var(--green); }
        .w-change.down { color:var(--red); }
        .w-change.flat { color:var(--text-2); }
        .w-spark { width:64px; height:28px; display:block; }

        /* ── SENTIMENT GAUGE ── */
        .sentiment-box { padding:1.2rem 1.5rem; border-bottom:1px solid var(--border); }
        .sentiment-box .s-title { font-family:'Syne Mono',monospace; font-size:.58rem; letter-spacing:.2em; color:var(--text-2); text-transform:uppercase; margin-bottom:.8rem; }
        .gauge-bar { height:6px; border-radius:3px; background:linear-gradient(to right, var(--red), var(--gold), var(--green)); position:relative; margin-bottom:.6rem; }
        .gauge-pointer { position:absolute; top:-4px; width:14px; height:14px; border-radius:50%; background:var(--text); border:2px solid var(--bg); transform:translateX(-50%); transition:left .5s ease; }
        .gauge-labels { display:flex; justify-content:space-between; font-family:'Syne Mono',monospace; font-size:.55rem; color:var(--text-3); letter-spacing:.08em; }
        .gauge-value { text-align:center; font-family:'Cormorant Garamond',serif; font-size:1.3rem; font-weight:400; }

        /* ── TRADINGVIEW MODAL ── */
        .tv-modal {
            display:none; position:fixed; inset:0; z-index:10000;
            background:rgba(6,6,15,.92); backdrop-filter:blur(6px);
            align-items:center; justify-content:center;
        }
        .tv-modal.open { display:flex; }
        .tv-modal-inner {
            background:var(--surface); border:1px solid var(--border-lt);
            border-radius:4px; width:min(1100px,96vw); height:min(680px,90vh);
            display:flex; flex-direction:column; overflow:hidden;
            box-shadow:0 24px 80px rgba(0,0,0,.6);
        }
        .tv-modal-head {
            padding:.9rem 1.5rem; border-bottom:1px solid var(--border);
            display:flex; justify-content:space-between; align-items:center;
            background:var(--surface2);
        }
        .tv-modal-title { font-family:'Cormorant Garamond',serif; font-size:1.15rem; font-weight:400; }
        .tv-modal-close {
            background:none; border:1px solid var(--border-lt); color:var(--text-2);
            width:28px; height:28px; border-radius:2px; cursor:pointer; font-size:.85rem;
            display:flex; align-items:center; justify-content:center; transition:all .12s;
        }
        .tv-modal-close:hover { border-color:var(--red); color:var(--red); }
        .tv-modal-body { flex:1; overflow:hidden; }

        /* ── LOADING ── */
        .loading-state { padding:3rem 2rem; text-align:center; }
        .loading-state p { font-family:'Syne Mono',monospace; font-size:.65rem; letter-spacing:.2em; color:var(--text-3); animation:pulse 1.2s ease infinite; }
        @keyframes pulse { 0%,100%{opacity:.2} 50%{opacity:.7} }

        /* ── RESPONSIVE ── */
        @media(max-width:900px){
            .layout { grid-template-columns:1fr; }
            .sidebar { border-top:1px solid var(--border); }
            .indices-row { grid-template-columns:1fr; }
            .index-card { border-right:none; border-bottom:1px solid var(--border); }
            header,.panel-head { padding-left:1.2rem; padding-right:1.2rem; }
            .news-item { padding:1rem 1.2rem; }
            .sector-grid { grid-template-columns:repeat(4,1fr); }
            .sector-row { padding:.8rem 1.2rem; }
        }
        @media(max-width:480px){
            .sector-grid { grid-template-columns:repeat(4,1fr); }
        }
    </style>
</head>
<body>

<!-- TICKER -->
<div class="ticker-bar">
    <div class="ticker-track" id="ticker-track">
        <span style="font-family:'Syne Mono',monospace;font-size:.68rem;color:var(--text-3);letter-spacing:.1em">Loading market data...</span>
    </div>
</div>

<!-- HEADER -->
<header>
    <div>
        <div class="eyebrow">OrcaHS9 — Market Intelligence</div>
        <h1>News &amp; <em>Market Impact</em></h1>
    </div>
    <div class="hdr-right">
        <div class="live-dot">Live Feed</div>
        <div class="last-update" id="last-update">Fetching data...</div>
    </div>
</header>

<!-- INDICES -->
<div class="indices-row" id="indices-row">
    <div class="index-card" onclick="openChart('QQQ','NASDAQ 100')">
        <div>
            <div class="index-name">NASDAQ 100</div>
            <div class="index-price" id="idx-ixic">—</div>
            <div class="index-change flat" id="idx-ixic-chg">—</div>
        </div>
        <svg class="index-bar" id="spark-QQQ"></svg>
    </div>
    <div class="index-card" onclick="openChart('SPY','S&amp;P 500')">
        <div>
            <div class="index-name">S&amp;P 500</div>
            <div class="index-price" id="idx-gspc">—</div>
            <div class="index-change flat" id="idx-gspc-chg">—</div>
        </div>
        <svg class="index-bar" id="spark-SPY"></svg>
    </div>
    <div class="index-card" onclick="openChart('DIA','Dow Jones')">
        <div>
            <div class="index-name">Dow Jones</div>
            <div class="index-price" id="idx-dji">—</div>
            <div class="index-change flat" id="idx-dji-chg">—</div>
        </div>
        <svg class="index-bar" id="spark-DIA"></svg>
    </div>
</div>

<!-- SECTOR HEATMAP -->
<div class="sector-row">
    <div class="sector-row-label">Sector Performance</div>
    <div class="sector-grid" id="sector-grid">
        <div class="sector-cell" style="background:#1a1a2c"><span class="sector-name">—</span></div>
    </div>
</div>

<!-- LAYOUT -->
<div class="layout">

    <!-- NEWS -->
    <div class="news-panel">
        <div class="panel-head">
            <div class="panel-title"><span class="icon">◈</span> Market News</div>
            <div class="filter-bar">
                <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
                <button class="filter-btn" onclick="setFilter('bullish',this)">Bullish</button>
                <button class="filter-btn" onclick="setFilter('bearish',this)">Bearish</button>
            </div>
        </div>
        <div class="news-list" id="news-list">
            <div class="loading-state"><p>Fetching latest market news...</p></div>
        </div>
    </div>

    <!-- SIDEBAR -->
    <div class="sidebar">

        <!-- Sentiment Gauge -->
        <div class="sentiment-box">
            <div class="s-title">Market Sentiment</div>
            <div class="gauge-bar"><div class="gauge-pointer" id="gauge-ptr" style="left:50%"></div></div>
            <div class="gauge-labels"><span>Fear</span><span>Neutral</span><span>Greed</span></div>
            <div class="gauge-value" id="gauge-label" style="margin-top:.6rem;color:var(--text-2)">—</div>
        </div>

        <!-- Watchlist -->
        <div class="watchlist">
            <div class="watchlist-head">
                <div class="watchlist-title">Watchlist</div>
                <div class="watchlist-hint">click to chart</div>
            </div>
            <div id="watchlist-body">
                <div class="loading-state"><p>Loading...</p></div>
            </div>
        </div>

    </div>
</div>

<!-- TRADINGVIEW MODAL -->
<div class="tv-modal" id="tv-modal" onclick="closeChart(event)">
    <div class="tv-modal-inner">
        <div class="tv-modal-head">
            <div class="tv-modal-title" id="tv-modal-title">Chart</div>
            <button class="tv-modal-close" onclick="closeChart(null)">✕</button>
        </div>
        <div class="tv-modal-body" id="tv-modal-body"></div>
    </div>
</div>

<script>
// ── State ─────────────────────────────────────────────────────────
let allNews    = [];
let activeFilter = 'all';
const REFRESH_MS = 2 * 60 * 1000;

// ── Format helpers ─────────────────────────────────────────────────
const fmtPrice  = n => Number(n).toLocaleString('en-US', { minimumFractionDigits:2, maximumFractionDigits:2 });
const fmtChg    = n => (n >= 0 ? '+' : '') + Number(n).toFixed(2);
const fmtPct    = n => (n >= 0 ? '+' : '') + Number(n).toFixed(2) + '%';
const chgClass  = n => n > 0 ? 'up' : n < 0 ? 'down' : 'flat';
const timeAgo   = iso => {
    const diff = (Date.now() - new Date(iso)) / 1000;
    if (diff < 60)   return Math.floor(diff) + 's ago';
    if (diff < 3600) return Math.floor(diff/60) + 'm ago';
    if (diff < 86400)return Math.floor(diff/3600) + 'h ago';
    return Math.floor(diff/86400) + 'd ago';
};

// ── TradingView exchange map ───────────────────────────────────────
const TV_EXCHANGE = {
    'QQQ':'NASDAQ','SPY':'AMEX','DIA':'AMEX',
    'NVDA':'NASDAQ','AAPL':'NASDAQ','TSLA':'NASDAQ','META':'NASDAQ',
    'MSFT':'NASDAQ','AMZN':'NASDAQ','GOOGL':'NASDAQ','ASML':'NASDAQ',
    'TSM':'NYSE','PLTR':'NYSE','AMD':'NASDAQ',
    'XLK':'AMEX','XLF':'AMEX','XLE':'AMEX','XLV':'AMEX',
    'XLY':'AMEX','XLI':'AMEX','XLC':'AMEX','XLB':'AMEX'
};

// ── Sparkline SVG helper ───────────────────────────────────────────
function drawSparkline(svgEl, prices, color) {
    if (!prices || prices.length < 2) return;
    const W = 80, H = 36;
    const min = Math.min(...prices);
    const max = Math.max(...prices);
    const range = max - min || 1;
    const pts = prices.map((p, i) => {
        const x = (i / (prices.length - 1)) * W;
        const y = H - ((p - min) / range) * (H - 4) - 2;
        return `${x.toFixed(1)},${y.toFixed(1)}`;
    }).join(' ');
    svgEl.setAttribute('viewBox', `0 0 ${W} ${H}`);
    svgEl.innerHTML = `
        <polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
    `;
}

// ── Load sparklines ────────────────────────────────────────────────
async function loadSparkline(symbol) {
    try {
        const res  = await fetch(`/api/candles/${symbol}`);
        const data = await res.json();
        const prices = data.c || [];
        if (!prices.length) return;
        const last7 = prices.slice(-14);
        const el = document.getElementById(`spark-${symbol}`);
        if (!el) return;
        const change = prices[prices.length - 1] - prices[prices.length - 2];
        const color  = change >= 0 ? '#5cba8a' : '#d96060';
        drawSparkline(el, last7, color);
    } catch(e) {}
}

// ── Fetch all data ─────────────────────────────────────────────────
async function fetchAll() {
    try {
        const res  = await fetch('/api/all');
        const data = await res.json();
        renderMarket(data.market);
        allNews = data.news;
        renderNews();
        document.getElementById('last-update').textContent = 'Updated ' + new Date(data.updated).toLocaleTimeString('en-MY', {hour:'2-digit',minute:'2-digit'});
    } catch(e) {
        console.error('Fetch error:', e);
    }
}

// ── Market render ──────────────────────────────────────────────────
const INDEX_MAP = { 'QQQ':'ixic', 'SPY':'gspc', 'DIA':'dji' };

function renderMarket(quotes) {
    if (!quotes || !quotes.length) return;

    const indices = quotes.filter(q => q.type === 'index');
    const stocks  = quotes.filter(q => q.type === 'stock');
    const sectors = quotes.filter(q => q.type === 'sector');

    // ── Indices row ──
    for (const q of indices) {
        const key = INDEX_MAP[q.symbol];
        if (!key) continue;
        const priceEl = document.getElementById(`idx-${key}`);
        const chgEl   = document.getElementById(`idx-${key}-chg`);
        if (priceEl) priceEl.textContent = fmtPrice(q.regularMarketPrice);
        if (chgEl) {
            chgEl.textContent = fmtChg(q.regularMarketChange) + '  ' + fmtPct(q.regularMarketChangePercent);
            chgEl.className   = 'index-change ' + chgClass(q.regularMarketChange);
        }
    }

    // ── Sector heatmap ──
    const sectorGrid = document.getElementById('sector-grid');
    if (sectors.length) {
        sectorGrid.innerHTML = sectors.map(s => {
            const pct  = s.regularMarketChangePercent || 0;
            const abs  = Math.abs(pct);
            const intensity = Math.min(abs / 3, 1); // saturate at ±3%
            let bg;
            if (pct > 0) {
                const g = Math.round(40 + intensity * 70);
                const r = Math.round(10 + (1-intensity) * 30);
                bg = `rgb(${r},${g},${Math.round(10+intensity*20)})`;
            } else if (pct < 0) {
                const r = Math.round(60 + intensity * 90);
                const g = Math.round(10 + (1-intensity) * 20);
                bg = `rgb(${r},${g},${Math.round(10+intensity*10)})`;
            } else {
                bg = '#1a1a2c';
            }
            return `<div class="sector-cell" style="background:${bg}" onclick="openChart('${s.symbol}','${s.shortName}')">
                <div class="sector-name">${s.shortName}</div>
                <div class="sector-pct">${fmtPct(pct)}</div>
            </div>`;
        }).join('');
    }

    // ── Ticker — all stocks ──
    const tickerItems = [...stocks, ...stocks].map(q => `
        <span class="ticker-item">
            <span class="ticker-symbol">${q.symbol}</span>
            <span class="ticker-price">${fmtPrice(q.regularMarketPrice)}</span>
            <span class="ticker-change ${chgClass(q.regularMarketChange)}">${fmtPct(q.regularMarketChangePercent)}</span>
        </span>`).join('');
    document.getElementById('ticker-track').innerHTML = tickerItems
        || '<span style="font-family:\'Syne Mono\',monospace;font-size:.68rem;color:var(--text-3)">Market data unavailable</span>';

    // ── Watchlist — stocks with sparklines ──
    const wb = document.getElementById('watchlist-body');
    wb.innerHTML = stocks.map(q => `
        <div class="watchlist-item" onclick="openChart('${q.symbol}','${q.shortName||q.symbol}')">
            <div class="w-left">
                <div class="w-symbol">${q.symbol}</div>
                <div class="w-name">${q.shortName || ''}</div>
            </div>
            <svg class="w-spark" id="spark-${q.symbol}"></svg>
            <div class="w-right">
                <div class="w-price">${fmtPrice(q.regularMarketPrice)}</div>
                <div class="w-change ${chgClass(q.regularMarketChange)}">${fmtPct(q.regularMarketChangePercent)}</div>
            </div>
        </div>`).join('') || '<div class="loading-state"><p>No data</p></div>';

    // Load sparklines for all symbols (staggered to avoid rate limits)
    const allSymbols = [...indices.map(q=>q.symbol), ...stocks.map(q=>q.symbol)];
    allSymbols.forEach((sym, i) => setTimeout(() => loadSparkline(sym), i * 300));
}

// ── News render ────────────────────────────────────────────────────
function setFilter(f, btn) {
    activeFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderNews();
}

function renderNews() {
    const filtered = activeFilter === 'all' ? allNews : allNews.filter(n => n.sentiment === activeFilter);

    // Sentiment gauge
    const bull  = allNews.filter(n=>n.sentiment==='bullish').length;
    const bear  = allNews.filter(n=>n.sentiment==='bearish').length;
    const total = bull + bear || 1;
    const score = bull / total;
    document.getElementById('gauge-ptr').style.left = (score * 100) + '%';
    const labels      = ['Extreme Fear','Fear','Neutral','Greed','Extreme Greed'];
    const labelColors = ['var(--red)','#e07a40','var(--text-2)','#8aba6a','var(--green)'];
    const li = Math.min(4, Math.floor(score * 5));
    document.getElementById('gauge-label').textContent = labels[li];
    document.getElementById('gauge-label').style.color = labelColors[li];

    if (!filtered.length) {
        document.getElementById('news-list').innerHTML = `<div class="loading-state"><p>No ${activeFilter} news found.</p></div>`;
        return;
    }

    document.getElementById('news-list').innerHTML = filtered.map(n => `
        <a class="news-item" href="${n.link}" target="_blank" rel="noopener">
            <div class="news-meta">
                <span class="news-source">${n.source}</span>
                <span class="news-time">${timeAgo(n.date)}</span>
                <span class="sentiment-badge ${n.sentiment}">${n.sentiment}</span>
            </div>
            <div class="news-title">${n.title}</div>
            ${n.summary ? `<div class="news-summary">${n.summary}</div>` : ''}
            ${n.impacts.length ? `<div class="impact-tags">${n.impacts.flatMap(i => i.tags.map(t => `<span class="impact-tag" style="color:${i.color};border-color:${i.color}33;background:${i.color}10">${t}</span>`)).join('')}</div>` : ''}
        </a>`).join('');
}

// ── TradingView Chart Modal ────────────────────────────────────────
let tvScriptLoaded = false;

function openChart(symbol, name) {
    const modal = document.getElementById('tv-modal');
    const body  = document.getElementById('tv-modal-body');
    const title = document.getElementById('tv-modal-title');

    const exchange = TV_EXCHANGE[symbol] || 'NASDAQ';
    const tvSym    = `${exchange}:${symbol}`;

    title.textContent = `${symbol} — ${name}`;
    body.innerHTML    = `<div id="tv_widget_container" style="width:100%;height:100%"></div>`;
    modal.classList.add('open');
    document.body.style.overflow = 'hidden';

    function createWidget() {
        new TradingView.widget({
            container_id: 'tv_widget_container',
            autosize:     true,
            symbol:       tvSym,
            interval:     'D',
            timezone:     'America/New_York',
            theme:        'dark',
            style:        '1',
            locale:       'en',
            toolbar_bg:   '#0d0d18',
            hide_side_toolbar: false,
            allow_symbol_change: true,
            save_image:   false,
        });
    }

    if (!tvScriptLoaded) {
        const s = document.createElement('script');
        s.src = 'https://s3.tradingview.com/tv.js';
        s.onload = () => { tvScriptLoaded = true; createWidget(); };
        document.head.appendChild(s);
    } else {
        createWidget();
    }
}

function closeChart(e) {
    if (e && e.target !== document.getElementById('tv-modal')) return;
    document.getElementById('tv-modal').classList.remove('open');
    document.getElementById('tv-modal-body').innerHTML = '';
    document.body.style.overflow = '';
}

document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeChart(null);
});

// ── Init & Auto-refresh ────────────────────────────────────────────
fetchAll();
setInterval(fetchAll, REFRESH_MS);
setInterval(() => { if(allNews.length) renderNews(); }, 60 * 1000);
</script>
